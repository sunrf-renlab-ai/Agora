<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; margin: 0; padding: 24px; background: #fafafa; color: #1a1a1a; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .meta { color: #666; font-size: 13px; margin-bottom: 20px; }
  .row { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .row h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
  .pair { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .pair > div { display: flex; flex-direction: column; gap: 6px; }
  .pair img { width: 100%; height: auto; border: 1px solid #e5e7eb; border-radius: 4px; cursor: zoom-in; background: #f3f4f6; }
  .pair label { font-size: 12px; color: #666; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  details { margin-top: 24px; }
  summary { cursor: pointer; font-weight: 600; color: #4f46e5; }
  pre { background: #f8fafc; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; }
</style>
